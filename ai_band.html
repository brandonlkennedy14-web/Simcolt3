// -- LEARNING ENGINE A: CROSS-SENSE CHAOS REWARD ---------------------------
// sim3 chaos directly rewards/punishes harmony choices.
// High chaos + lydian/aug/dim = reward. Low chaos + maj/min = reward.
// This wires the visual sim into the musical decision making.
const chaosRewardEngine={
  active: false,
  lastChaos: 0.3,
  update(chaos, chordType){
    if(!this.active)return;
    const ct=CHORDS[chordType]||CHORDS.maj;
    // High chaos -> reward dissonant chords (fm ratio > 1.5)
    // Low chaos  -> reward consonant chords (fm ratio < 1.35)
    const isDissonant=ct.fm>=1.5;
    const isChaotic=chaos>0.55;
    const aligned=(isDissonant&&isChaotic)||(!isDissonant&&!isChaotic);
    const rewardVal=aligned?0.85:0.25;
    // Reward all intervals in current chord
    ct.iv.forEach(iv=>brain.reward('lead',iv,rewardVal));
    ct.iv.forEach(iv=>brain.reward('mid',iv,rewardVal));
    // Reinforce bass brain with chaos signal
    const inputs=bassBrain.history[bassBrain.history.length-1];
    if(inputs){
      bassBrain.weights=bassBrain.weights.map(row=>
        row.map((w,i)=>Math.max(-2,Math.min(2,
          w + 0.018*(chaos - this.lastChaos)*(inputs[i]||0)*Math.tanh(w)
        )))
      );
    }
    this.lastChaos=chaos;
  }
};

// -- LEARNING ENGINE B: PROGRESSION MEMORY ---------------------------------
// Tracks chord sequences across measures. When a sequence resolves well
// (tension->release detected by chaos drop or user tap), it gets stored
// and replayed/reinforced in future sessions.
const progressionMemory={
  active: false,
  window: [],       // last 8 chord types
  maxWindow: 8,
  library: [],      // {seq, score, uses} — learned progressions
  lastChaos: 0.3,
  push(chordType, chaos){
    if(!this.active)return;
    this.window.push(chordType);
    if(this.window.length>this.maxWindow)this.window.shift();
    // Resolution detection: chaos dropped significantly this measure
    const chaosDelta=this.lastChaos - chaos;
    if(chaosDelta>0.08 && this.window.length>=3){
      this.recordResolution(chaosDelta);
    }
    this.lastChaos=chaos;
  },
  recordResolution(strength){
    const seq=this.window.slice(-4).join('-');
    const existing=this.library.find(p=>p.seq===seq);
    if(existing){
      existing.score=Math.min(1,existing.score+strength*0.3);
      existing.uses++;
    }else{
      this.library.push({seq,score:Math.min(1,strength),uses:1});
      if(this.library.length>32)
        this.library.sort((a,b)=>b.score-a.score).splice(32);
    }
    // Reinforce the Q-table for chords in this sequence
    this.window.slice(-4).forEach(ct=>{
      const def=CHORDS[ct];
      if(def)def.iv.forEach(iv=>brain.reward('mid',iv,0.7+strength*0.3));
    });
  },
  // Returns best next chord given current chord, or null
  suggest(currentChord){
    if(!this.active||this.library.length===0)return null;
    const recent=this.window.slice(-2).join('-');
    const candidates=this.library
      .filter(p=>p.seq.startsWith(recent))
      .sort((a,b)=>b.score-a.score);
    if(!candidates.length)return null;
    // Pick from top 3 weighted by score
    const top=candidates.slice(0,3);
    const total=top.reduce((s,c)=>s+c.score,0);
    let r=Math.random()*total;
    for(const c of top){
      r-=c.score;
      if(r<=0)return c.seq.split('-')[2]||null; // next chord in seq
    }
    return null;
  },
  // Serialize for Supabase save
  serialize(){return{window:this.window,library:this.library.slice(0,32)};},
  load(data){
    if(data?.library)this.library=[...data.library];
    if(data?.window)this.window=[...data.window];
  }
};

// -- LEARNING ENGINE C: CONVERGENCE TRACKER --------------------------------
// Tracks a rolling "musical tension" score across sessions.
// Uses: chord dissonance over time, chaos variance, phrase completion rate.
// Exposes a loss value the brain uses to adjust exploration rate (eps).
const convergenceTracker={
  active: false,
  history: [],      // {tension, chaos, chordFm, ts}
  loss: 0.5,        // 0=fully converged, 1=random
  sessionScore: 0,
  phrasesThisSession: 0,
  push(chaos, chordType, phraseCount){
    if(!this.active)return;
    const ct=CHORDS[chordType]||CHORDS.maj;
    const tension=ct.fm*(0.5+chaos*0.5);
    this.history.push({tension,chaos,chordFm:ct.fm,ts:Date.now()});
    if(this.history.length>64)this.history.shift();
    this.phrasesThisSession=phraseCount;
    this._recalc();
  },
  _recalc(){
    if(this.history.length<4)return;
    const recent=this.history.slice(-16);
    // Variance of tension = how much the music is moving
    const mean=recent.reduce((s,h)=>s+h.tension,0)/recent.length;
    const variance=recent.reduce((s,h)=>s+(h.tension-mean)**2,0)/recent.length;
    // Good music has moderate variance (not static, not random)
    const idealVariance=0.08;
    const varLoss=Math.abs(variance-idealVariance)/idealVariance;
    // Phrase completion rewards convergence
    const phraseBonus=Math.min(1,this.phrasesThisSession/5)*0.3;
    this.loss=Math.max(0,Math.min(1, varLoss*0.7 - phraseBonus));
    // Feed loss back to brain exploration rate
    if(convergenceTracker.active){
      brain.eps=Math.max(0.04, Math.min(0.45, this.loss*0.4 + 0.04));
    }
    this.sessionScore=Math.round((1-this.loss)*100);
  },
  serialize(){return{history:this.history.slice(-32),loss:this.loss,sessionScore:this.sessionScore};},
  load(data){
    if(data?.history)this.history=[...data.history];
    if(typeof data?.loss==='number')this.loss=data.loss;
    if(typeof data?.sessionScore==='number')this.sessionScore=data.sessionScore;
  }
};

// -- THEORY --------------------------------------------------------------------
const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const midiToNote=m=>`${NOTE_NAMES[((m%12)+12)%12]}${Math.floor(m/12)-1}`;
const PC=[[239,68,68],[249,115,22],[245,158,11],[252,211,77],[132,204,22],[34,197,94],[20,184,166],[6,182,212],[59,130,246],[99,102,241],[168,85,247],[236,72,153]];

const SCALES={major:[0,2,4,5,7,9,11],minor:[0,2,3,5,7,8,10],dorian:[0,2,3,5,7,9,10],mixo:[0,2,4,5,7,9,10],whole:[0,2,4,6,8,10],phrygian:[0,1,3,5,7,8,10]};

// FM ratios encode chord quality mathematically
const CHORDS={
  maj:   {iv:[0,4,7],   fm:1.250,label:'maj'},
  min:   {iv:[0,3,7],   fm:1.200,label:'min'},
  dom7:  {iv:[0,4,7,10],fm:1.500,label:'7'},
  maj7:  {iv:[0,4,7,11],fm:1.750,label:'M7'},
  min7:  {iv:[0,3,7,10],fm:1.400,label:'m7'},
  quar:  {iv:[0,5,10],  fm:1.333,label:'sus4'},
  dim:   {iv:[0,3,6],   fm:1.100,label:'dim'},
  aug:   {iv:[0,4,8],   fm:1.600,label:'aug'},
  dom9:  {iv:[0,4,7,10,14],fm:1.520,label:'9'},
  min11: {iv:[0,3,7,10,14],fm:1.450,label:'m11'},
  lydian:{iv:[0,4,7,11,6], fm:1.780,label:'lyd'},
};

function bestChord(pcs){
  if(!pcs||pcs.length<2)return'maj';
  const root=pcs[0];
  const ivs=pcs.map(p=>((p-root)+12)%12).sort((a,b)=>a-b);
  let best='maj',bs=-1;
  for(const[n,c]of Object.entries(CHORDS)){let s=0;for(const v of c.iv)if(ivs.includes(v%12))s++;if(s>bs){bs=s;best=n;}}
  return best;
}

function bestScale(hist){
  return Object.entries(SCALES).map(([name,sc])=>({name,sc,s:sc.reduce((a,d)=>a+(hist[d]||0),0)})).sort((a,b)=>b.s-a.s)[0];
}

// -- HAPTIC ENGINE -------------------------------------------------------------
// Haptic engine -- Android requires vibrate called from user gesture context

};

const hap={
  tap:()=>VIB([20]),
  kick:()=>VIB([60]),         // long deep for sub feel
  snare:()=>VIB([15,5,15]),   // double hit
  hat:()=>VIB([8]),
  chord:()=>VIB([30,10,30,10,30]),
  motif:()=>VIB([10,5,10,5,10,5,10]),
  lockIn:()=>VIB([40,20,80,20,40]),

  restart:()=>VIB([80,30,80]),
  mute:()=>VIB([15,10,15]),
  // Rhythm haptic: pattern from array of beat timings
  rhythm:(pattern)=>VIB(pattern.flatMap(ms=>[ms>0?Math.min(ms,80):20,20])),
  // Bass sub pulse -- strongest single vibration for deaf users to feel the groove
  subBass:(bpm)=>{
    const ms=Math.round(60000/bpm);
    VIB([ms*0.6,ms*0.4,ms*0.6,ms*0.4,ms*0.6]);
  },
  // Chord quality haptic: different patterns for different chords
  chordQuality:(type)=>{
    const patterns={maj:[40,20,40],min:[60,15,30],dom7:[30,10,30,10,30],quar:[20,20,20,20],dim:[50,10,50]};
    VIB(patterns[type]||patterns.maj);
  },
};

// -- PROFESSIONAL SIGNAL CHAIN -------------------------------------------------
//
//  drums  -> drumComp (transient punch, 2ms attack) -> drumBus ---------------
//  bass   -> bassComp (Moog-style glue, 8ms attack) -> bassBus --------------
//  sub    -> subComp  (slow attack, long release)   -> subBus  --------------
//  mid    ------------------------------------------> send -----------------
//  lead   ------------------------------------------> send -----------------
//           [reverb/delay/chorus insert on send] -------------------------
//  ALL buses -------------------------------------------------------------> masterComp
//                                                                          -> limiter (-0.5 dBFS)
//                                                                          -> out
//
// Sub and bass NEVER share stage simultaneously -- scheduler alternates them.
// Sub bus is low-passed at 120Hz so it only contains true sub frequencies.
// Drum bus has high-pass at 30Hz to prevent sub clash with kick sub layer.

class AudioBus{
  constructor(){
    this.ctx=null;this.inited=false;
    // Bus input nodes (synths connect here)
    this.drumBus=null;this.bassBus=null;this.subBus=null;this.send=null;
    // Compressors
    this.drumComp=null;this.bassComp=null;this.subComp=null;this.masterComp=null;
    // Limiter
    this.limiter=null;
    // FX
    this.reverbWet=null;this.convolver=null;
    this.delayNode=null;this.delayWet=null;
    this.chorusDelay=null;this.chorusWet=null;
    this.fxEnabled={reverb:false,delay:false,chorus:false};
  }

  init(ctx){
    if(this.inited&&this.ctx===ctx)return;
    this.ctx=ctx;this.inited=true;

    // -- LIMITER: brick wall at -0.5 dBFS -- speakers safe, nothing clips ---
    // threshold=-0.5dB, ratio=20:1, knee=0, attack=0.001s, release=0.05s
    this.limiter=ctx.createDynamicsCompressor();
    this.limiter.threshold.value=-0.5;
    this.limiter.knee.value=0;       // hard knee -- true brickwall
    this.limiter.ratio.value=20.0;   // effectively infinite limiting
    this.limiter.attack.value=0.001; // 1ms -- catches fast transients
    this.limiter.release.value=0.05; // 50ms -- quick recovery
    this.limiter.connect(ctx.destination);

    // -- MASTER BUS COMPRESSOR: glue everything together ------------------
    // Gentle 2:1, slow attack so transients punch through
    this.masterComp=ctx.createDynamicsCompressor();
    this.masterComp.threshold.value=-14;
    this.masterComp.knee.value=6;
    this.masterComp.ratio.value=2.5;
    this.masterComp.attack.value=0.025;  // 25ms -- lets kick/snare transients breathe
    this.masterComp.release.value=0.18;  // 180ms
    this.masterComp.connect(this.limiter);

    const masterGain=ctx.createGain();masterGain.gain.value=0.80;
    masterGain.connect(this.masterComp);

    // -- DRUM BUS: transient shaper compressor ----------------------------
    // Very fast attack (2ms) squashes body slightly for punch, slow release
    // lets the tail breathe. Classic "NY compression" on drums.
    this.drumComp=ctx.createDynamicsCompressor();
    this.drumComp.threshold.value=-18;
    this.drumComp.knee.value=3;
    this.drumComp.ratio.value=4.0;   // 4:1 for controlled transients
    this.drumComp.attack.value=0.002; // 2ms -- very fast, catches body
    this.drumComp.release.value=0.12; // 120ms release -- lets tail through
    this.drumComp.connect(masterGain);
    // HPF on drum bus -- stops sub-octave mud from kick sub colliding with sub bus
    const drumHPF=ctx.createBiquadFilter();drumHPF.type='highpass';drumHPF.frequency.value=28;drumHPF.Q.value=0.5;
    drumHPF.connect(this.drumComp);
    this.drumBus=ctx.createGain();this.drumBus.gain.value=0.95;
    this.drumBus.connect(drumHPF);

    // -- BASS BUS: Moog-style glue compressor -----------------------------
    // 8ms attack preserves the attack pluck/slap, 4:1 for consistent sustain
    // HPF at 60Hz -- anything below is sub territory, not bass territory
    this.bassComp=ctx.createDynamicsCompressor();
    this.bassComp.threshold.value=-20;
    this.bassComp.knee.value=4;
    this.bassComp.ratio.value=4.0;
    this.bassComp.attack.value=0.008;  // 8ms -- preserves attack character
    this.bassComp.release.value=0.20;  // 200ms smooth release
    this.bassComp.connect(masterGain);

    this.send.connect(this.delayWet);this.delayWet.connect(this.delayNode);

  // sub and bass are SEPARATE -- sub goes below 120Hz, bass sits 60-600Hz
  getInput(type){

// -- MOTIF ENGINE (robust: handles jazz, polyrhythm, Indian tala) --------------
class MotifEngine{
  constructor(){
    this.pitchBuf=[];
    this.rhythmBuf=[];
    this.motifs=[];
    this.phrases=[];          // completed sung phrases (start tap -> end tap)
    this.currentPhrase=null;  // phrase being recorded
    this.echoQueue=[];
    this.reharmonizations=[];
    this.keyHistory=[];
    this.timeSignatures=[];   // detected per-phrase time sigs
  }

  // Called when user taps to START a phrase
  startPhrase(){
    this.currentPhrase={pitches:[],onsets:[],startTime:Date.now()};
  }

  // Called when user taps to END a phrase -- full analysis runs here
  endPhrase(){
    if(!this.currentPhrase||this.currentPhrase.pitches.length<2)return null;
    const p=this.currentPhrase;
    const dur=Date.now()-p.startTime;

    // Interval vector -- intervals between consecutive pitches
    const ivs=p.pitches.slice(1).map((n,i)=>n-p.pitches[i]);

    // Turnaround detection: last 2 intervals reverse direction and land near root
    const hasTA=ivs.length>=3&&Math.sign(ivs[ivs.length-1])!==Math.sign(ivs[ivs.length-2])
      &&Math.abs(((p.pitches[p.pitches.length-1]-p.pitches[0])%12+12)%12)<=2;

    // Key detection from pitch class histogram
    const hist=new Array(12).fill(0);
    p.pitches.forEach(n=>hist[((n%12)+12)%12]++);
    const root=hist.indexOf(Math.max(...hist));

    // Time signature from onset spacings
    let timeSig=4;
    if(p.onsets.length>=3){
      const gaps=p.onsets.slice(1).map((t,i)=>t-p.onsets[i]);
      const med=gaps.sort((a,b)=>a-b)[Math.floor(gaps.length/2)];
      const beats=Math.round(dur/med);
      if(beats>=2&&beats<=9)timeSig=beats;
    }

    // Chord inversion detection: lowest pitch in phrase vs root
    const lowestPc=((Math.min(...p.pitches)%12)+12)%12;
    const inversion=lowestPc===root?0:
      ((lowestPc-root+12)%12===4)?1:  // 1st inv (3rd in bass)
      ((lowestPc-root+12)%12===7)?2:0; // 2nd inv (5th in bass)

    // Reharmonization suggestions based on intervals
    const hasMinor3rd=ivs.some(v=>Math.abs(v)===3);
    const hasTritone=ivs.some(v=>Math.abs(v)===6);
    const reharmonSuggestion=hasTritone?'dim':hasMinor3rd?'min7':'maj7';

    const phrase={
      ivs,root,timeSig,inversion,hasTA,reharmonSuggestion,
      dur,pitches:[...p.pitches],onsets:[...p.onsets],
      t:Date.now()
    };
    this.phrases.push(phrase);
    if(this.phrases.length>16)this.phrases.shift();

    // Queue echo with reharmonization
    if(ivs.length>0){
      this.echoQueue.push({ivs,root:p.pitches[0],transpose:7,reharmonSuggestion});
    }

    // Track time signatures heard
    this.timeSignatures.push(timeSig);

    this.currentPhrase=null;
    return phrase;
  }

  addPitch(midi,t){
    this.pitchBuf.push({midi,t});
    if(this.pitchBuf.length>32)this.pitchBuf.shift();
    if(this.currentPhrase){
      this.currentPhrase.pitches.push(midi);
      this.currentPhrase.onsets.push(t);
    }
    return this._findMotif();
  }

  addOnset(t){
    this.rhythmBuf.push(t);
    if(this.rhythmBuf.length>32)this.rhythmBuf.shift();
    return this._analyzeRhythm();
  }

  _analyzeRhythm(){
    if(this.rhythmBuf.length<4)return null;
    const gaps=this.rhythmBuf.slice(1).map((t,i)=>t-this.rhythmBuf[i]);
    const sorted=[...gaps].sort((a,b)=>a-b);
    const median=sorted[Math.floor(sorted.length/2)];
    const filtered=gaps.filter(g=>g>median*0.15&&g<median*3.5);
    if(!filtered.length)return null;
    const avgGap=filtered.reduce((a,b)=>a+b)/filtered.length;
    const bpm=Math.round(60000/avgGap);
    if(bpm<30||bpm>300)return null;
    let lng=0,sht=0,n=0;
    for(let i=0;i<filtered.length-1;i+=2){lng+=filtered[i];sht+=filtered[i+1];n++;}
    const swingRatio=n&&sht?((lng/n)/(sht/n)):1.0;
    const swingPct=Math.min(100,Math.max(0,Math.round((swingRatio-1.0)*100)));
    const minGap=Math.min(...filtered);
    const subdivisions=Math.round(avgGap/minGap);
    return{bpm,swingPct,subdivisions,swingRatio};
  }

  _findMotif(){
    if(this.pitchBuf.length<3)return false;
    const recent=this.pitchBuf.slice(-6);
    const ivs=recent.slice(1).map((p,i)=>p.midi-recent[i].midi);
    const range=Math.max(...ivs.map(Math.abs));
    if(range>15||ivs.every(v=>v===ivs[0]))return false;
    const sig=ivs.join(',');
    if(!this.motifs.some(m=>m.sig===sig)){
      this.motifs.push({sig,ivs,root:recent[0].midi,t:Date.now()});
      if(this.motifs.length>12)this.motifs.shift();
      this.echoQueue.push({ivs,root:recent[0].midi,transpose:7});
      return true;
    }
    return false;
  }

  detectKeyChange(prevRoot,newRoot){
    return Math.abs(((newRoot-prevRoot+6)%12)-6)>=3;
  }

  // Returns most common time signature from phrase history
  dominantTimeSig(){
    if(!this.timeSignatures.length)return 4;
    const counts={};
    this.timeSignatures.forEach(t=>counts[t]=(counts[t]||0)+1);
    return parseInt(Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0]);
  }

  popEcho(){return this.echoQueue.shift()||null;}
}

// -- Q-LEARNING HARMONY BRAIN --------------------------------------------------
class Brain{
  constructor(){this.q={};this.n=0;this.eps=0.35;}
  con(iv){const m=((iv%12)+12)%12;return{0:1.0,7:.92,5:.88,4:.80,3:.72,9:.68,8:.62,2:.40,10:.40,1:.08,6:.05,11:.18}[m]??0.3;}
  choose(role,opts,chaos){
    this.n++;this.eps=Math.max(0.04,0.35-this.n*0.0002);
    if(Math.random()>this.eps){let b=opts[0],bw=-Infinity;for(const v of opts){const k=`${role}_${((v%12)+12)%12}`;const w=(this.q[k]??0.5)*(1+this.con(v)*(1-chaos*.6));if(w>bw){bw=w;b=v;}}return b;}
    return opts[Math.floor(Math.random()*opts.length)];
  }
  reward(role,iv,val){const k=`${role}_${((iv%12)+12)%12}`;this.q[k]=(this.q[k]??0.5)+0.08*(val-(this.q[k]??0.5));}
  auto(role,ivs,chaos){for(const v of ivs)this.reward(role,v,this.con(v)*(1-chaos*.4));}
  get quality(){return Math.min(1,this.n/400);}
}

// -- VOICE MEMORY --------------------------------------------------------------
class VoiceMemory{
  constructor(role){
    this.role=role;this.winding=0;this.lastNote=null;this.glow=0;
    this.angle=Math.random()*Math.PI*2;this.x=0;this.y=0;
    this.col={drum:[243,68,68],bass:[245,158,11],mid:[168,85,247],lead:[34,211,238]}[role]||[120,120,120];
    this.sample=null; // last unique generated sound params
  }

  tick(){this.glow*=0.90;this.angle+=0.007+this.winding*0.002;}

// -- SYNTHESIS -----------------------------------------------------------------
// Every hit is uniquely generated -- random seeds shape timbre, not just volume.
// No two kicks, snares, hats, or bass notes sound identical.

// Unique seed -> unique timbre parameters for each hit
function drumSeed(){return{
  pitch:   0.85+Math.random()*0.30,   // fundamental pitch offset
  punch:   0.72+Math.random()*0.26,   // attack intensity
  decay:   0.38+Math.random()*0.28,   // body length
  tone:    0.60+Math.random()*0.40,   // tonal vs noisy balance
  sub:     0.50+Math.random()*0.50,   // sub-octave weight
  click:   0.30+Math.random()*0.70,   // transient click brightness
  color:   Math.random(),             // spectral character (used differently per drum)
};}

function synthKick(ctx,t,warp,dest,inputEnergy=0.5){
  const s=drumSeed();
  // Each kick has its own unique fundamental, sub weight, click character
  const f0=(120+s.pitch*100+inputEnergy*60)*warp;  // unique start freq per hit
  const f1=(28+s.pitch*18)*warp;                   // unique landing freq
  const decay=(s.decay+inputEnergy*0.18)/warp;
  const punch=s.punch*(0.75+inputEnergy*0.22);

  // -- BODY: sine sweep with unique slope shape ----------------------------
  const body=ctx.createOscillator();body.type='sine';
  body.frequency.setValueAtTime(f0,t);
  body.frequency.setValueAtTime(f0*0.92,t+0.002);  // initial dip unique per hit
  body.frequency.exponentialRampToValueAtTime(f1,t+decay);
  const bg=ctx.createGain();
  bg.gain.setValueAtTime(0,t);
  bg.gain.linearRampToValueAtTime(punch,t+0.003);
  bg.gain.setValueAtTime(punch*(0.88+s.punch*0.08),t+0.010);
  bg.gain.exponentialRampToValueAtTime(0.001,t+decay+0.06);
  body.connect(bg);bg.connect(dest);body.start(t);body.stop(t+decay+0.12);

  // -- SUB LAYER: unique overtone content shaped by s.sub and s.color -----
  // Mix of sine + soft saturation for physical feel (deaf users)
  const subFreq=(22+s.pitch*14)*warp;
  const sub1=ctx.createOscillator();sub1.type='sine';sub1.frequency.value=subFreq;
  const sub2=ctx.createOscillator();sub2.type='sine';sub2.frequency.value=subFreq*1.5; // 3rd harmonic, unique mix
  const sg1=ctx.createGain();sg1.gain.setValueAtTime(s.sub*0.65*punch,t);sg1.gain.exponentialRampToValueAtTime(0.001,t+decay*1.5);
  const sg2=ctx.createGain();sg2.gain.setValueAtTime(s.color*0.25*punch,t);sg2.gain.exponentialRampToValueAtTime(0.001,t+decay*0.9);
  // Soft clip for warmth without harsh distortion
  const dist=ctx.createWaveShaper();
  const cv=new Float32Array(512);for(let i=0;i<512;i++){const x=i*2/512-1;cv[i]=Math.tanh(x*(1.5+s.sub));}
  dist.curve=cv;
  sub1.connect(sg1);sub2.connect(sg2);
  const subMix=ctx.createGain();subMix.gain.value=1;
  sg1.connect(subMix);sg2.connect(subMix);subMix.connect(dist);dist.connect(dest);
  sub1.start(t);sub2.start(t);sub1.stop(t+decay*1.6);sub2.stop(t+decay*1.0);

  // -- CLICK: unique high-freq transient, pitch and duration vary per hit --
  const ckFreq=(220+s.click*280)*warp;
  const click=ctx.createOscillator();click.type='square';
  click.frequency.setValueAtTime(ckFreq,t);
  click.frequency.exponentialRampToValueAtTime(ckFreq*0.18,t+0.038/warp);
  const cg=ctx.createGain();
  cg.gain.setValueAtTime(s.click*0.45,t);
  cg.gain.exponentialRampToValueAtTime(0.001,t+(0.030+s.click*0.025)/warp);
  click.connect(cg);cg.connect(dest);click.start(t);click.stop(t+0.065/warp);
}

function synthSnare(ctx,t,chaos,warp,dest,inputTight=0.5){
  const s=drumSeed();
  const bodyFreq=(155+s.pitch*90+inputTight*50)*warp;
  const tightness=s.tone*(0.5+inputTight*0.5);

  // -- BODY: tonal thump -- unique pitch and decay per hit ------------------
  const body=ctx.createOscillator();
  body.type=s.color>0.5?'triangle':'sine';  // varies timbre class
  body.frequency.setValueAtTime(bodyFreq,t);
  body.frequency.exponentialRampToValueAtTime(bodyFreq*(0.55+s.tone*0.2),t+0.09/warp);
  const bg=ctx.createGain();
  bg.gain.setValueAtTime(s.punch*0.62,t);
  bg.gain.exponentialRampToValueAtTime(0.001,t+(0.14+s.decay*0.08)/warp);
  body.connect(bg);bg.connect(dest);body.start(t);body.stop(t+0.25/warp);

  // -- RING: metallic overtone, unique ratio and decay ---------------------
  if(s.color>0.3){  // not every hit has ring -- variation
    const ring=ctx.createOscillator();ring.type='sine';
    ring.frequency.value=bodyFreq*(1.4+s.color*0.8);  // unique ring pitch
    const rg=ctx.createGain();
    rg.gain.setValueAtTime(s.color*0.22,t);
    rg.gain.exponentialRampToValueAtTime(0.001,t+(0.06+s.color*0.06)/warp);
    ring.connect(rg);rg.connect(dest);ring.start(t);ring.stop(t+0.16/warp);
  }

  // -- CRACK: unique noise burst -- different spectral shape every hit ------
  // Generate noise with unique RNG seed pattern for spectral variety
  const crLen=Math.floor(ctx.sampleRate*(0.028+tightness*0.030));
  const crBuf=ctx.createBuffer(1,crLen,ctx.sampleRate);
  const crD=crBuf.getChannelData(0);
  const seed1=s.click,seed2=s.color;
  for(let i=0;i<crLen;i++){
    const noiseVal=(Math.random()*2-1);
    const shape=Math.pow(1-i/crLen,0.6+seed1);
    crD[i]=noiseVal*shape*(1+seed2*Math.sin(i*0.08+seed1*10));
  }
  const crack=ctx.createBufferSource();crack.buffer=crBuf;
  const ckHpf=ctx.createBiquadFilter();ckHpf.type='highpass';ckHpf.frequency.value=(2200+s.click*2800)*warp;
  const cg=ctx.createGain();cg.gain.setValueAtTime(s.click*0.90,t);cg.gain.exponentialRampToValueAtTime(0.001,t+0.045/warp);
  crack.connect(ckHpf);ckHpf.connect(cg);cg.connect(dest);crack.start(t);

  // -- TAIL: snare wire noise -- unique length, brightness, and texture ------
  const tLen=Math.floor(ctx.sampleRate*(0.16+chaos*0.12+s.decay*0.08)/warp);
  const tBuf=ctx.createBuffer(2,tLen,ctx.sampleRate);  // stereo for width
  for(let ch=0;ch<2;ch++){
    const td=tBuf.getChannelData(ch);
    for(let i=0;i<tLen;i++){
      td[i]=(Math.random()*2-1)*(ch===0?1+s.color*0.3:1-s.color*0.3);  // L/R differ
    }
  }
  const tail=ctx.createBufferSource();tail.buffer=tBuf;
  const hpf=ctx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=(1200+chaos*2000+s.color*1200)*warp;
  const lpf=ctx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=(8000+s.click*6000)*warp;
  const tg=ctx.createGain();tg.gain.setValueAtTime(s.tone*0.52,t);tg.gain.exponentialRampToValueAtTime(0.001,t+(0.18+s.decay*0.10)/warp);
  tail.connect(hpf);hpf.connect(lpf);lpf.connect(tg);tg.connect(dest);tail.start(t);
}

function synthHat(ctx,t,open,chaos,warp,dest,inputBright=0.5){
  const s=drumSeed();
  const dur=(open?(0.22+s.decay*0.18):(0.028+s.tone*0.022))/warp;

  // -- METALLIC NOISE: 6-oscillator cymbal model, unique frequencies per hit -
  // Real cymbals are inharmonic -- we pick random ratios near irrational intervals
  const baseFreq=(400+s.pitch*300)*warp;
  const ratios=[1, 1.483+s.color*0.08, 1.932+s.sub*0.06, 2.546+s.click*0.10, 3.175+s.tone*0.08, 4.023+s.punch*0.12];
  const metalMix=ctx.createGain();metalMix.gain.value=1;metalMix.connect(dest);
  ratios.forEach((r,i)=>{
    const o=ctx.createOscillator();o.type='square';
    o.frequency.value=baseFreq*r*(0.997+Math.random()*0.006); // micro-detune
    const g=ctx.createGain();
    const vol=(i<2?0.28:0.12)*s.punch/(i+1);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur*(0.4+i*0.12));
    o.connect(g);g.connect(metalMix);o.start(t);o.stop(t+dur+0.02);
  });

  // -- NOISE LAYER: unique spectral window per hit --------------------------
  const nLen=Math.floor(ctx.sampleRate*Math.min(dur+0.015,0.45));
  const nBuf=ctx.createBuffer(1,nLen,ctx.sampleRate);
  const nD=nBuf.getChannelData(0);
  for(let i=0;i<nLen;i++)nD[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource();ns.buffer=nBuf;

  // High-pass with unique frequency per hit -- different tonal color each time
  const h1=ctx.createBiquadFilter();h1.type='highpass';
  h1.frequency.value=(5500+inputBright*3500+s.click*2000)*warp;
  const h2=ctx.createBiquadFilter();h2.type='bandpass';
  h2.frequency.value=(8000+s.color*5000)*warp;h2.Q.value=0.4+s.tone*0.5;
  const ng=ctx.createGain();
  ng.gain.setValueAtTime(open?0.22:0.16,t);ng.gain.exponentialRampToValueAtTime(0.001,t+dur);
  ns.connect(h1);h1.connect(h2);h2.connect(ng);ng.connect(dest);ns.start(t);
}

// -- SUB BASS: dedicated sub instrument, routes to subBus (below 120Hz) --------
// Sub bass holds a note for longer -- it's a sustained low-end foundation.
// Stage rule: when sub is playing, bass rests. They alternate, never stack.
// -- NEURAL SUB BASS ENGINE ---------------------------------------------------
// Deep learning-inspired: winding number history shapes every parameter.
// Each note is generated by a "neural" weight vector trained on recent play.
// Sub uses 5-layer harmonic stack + FM modulation + chaos-driven waveshaping.

// Mini neural layer: maps input vector to output weights via tanh activations
function neuralLayer(inputs, weights){
  // Single hidden-layer network: inputs -> tanh -> weighted sum -> sigmoid
  const hidden = weights.map(row => Math.tanh(row.reduce((s,w,wi)=>s+w*(inputs[wi]||0),0)));
  return hidden.reduce((s,h)=>s+h,0)/hidden.length;
}

// Bass "brain" -- evolves weights based on recent winding numbers and chaos
const bassBrain={
  weights: Array.from({length:8},()=>Array.from({length:6},()=>Math.random()*2-1)),
  history: [],
  update(winding, chaos, pcMod, beat){
    const inputs=[winding/10, chaos, pcMod, beat/16, Math.sin(winding), Math.cos(chaos*Math.PI)];
    this.history.push(inputs);
    if(this.history.length>32)this.history.shift();
    // Hebbian-style update: reinforce weights that correlate with recent patterns
    if(this.history.length>4){
      const prev=this.history[this.history.length-5];
      this.weights=this.weights.map(row=>row.map((w,i)=>
        Math.max(-2,Math.min(2, w + 0.012*(inputs[i]-prev[i])*Math.tanh(w)))
      ));
    }
    return inputs;
  },
  infer(inputs){
    return{
      harmonicMix:  (neuralLayer(inputs,this.weights.slice(0,2))+1)/2,  // 0-1
      attackTime:   Math.abs(neuralLayer(inputs,this.weights.slice(2,4)))*0.08,
      filterCutoff: (neuralLayer(inputs,this.weights.slice(4,6))+1)/2,
      satAmount:    Math.abs(neuralLayer(inputs,this.weights.slice(6,8)))*3+0.5,
      subFreqMod:   neuralLayer(inputs,this.weights)*0.03,  // micro-detune
    };
  }
};

function synthSubBass(ctx, t, note, chaos, warp, windBoost=0, beat=0){
  const dest=bus.getInput('sub'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const pc=((note%12)+12)%12; const pcMod=pc/12;
  const subHz=freq*0.5;

  // Neural inference -- winding history shapes this note's timbre
  const inputs=bassBrain.update(windBoost*10, chaos, pcMod, beat);
  const nn=bassBrain.infer(inputs);

  // -- LAYER 1: Primary sub fundamental ---------------------------------
  const f1=subHz*(1+nn.subFreqMod+s.sub*0.008);
  const osc1=ctx.createOscillator(); osc1.type='sine'; osc1.frequency.value=f1;
  const holdTime=(0.75+s.decay*0.5+windBoost*0.15)/warp;

  // Attack shape is neural-driven -- sometimes slow bloom, sometimes punchy
  const attackT=Math.max(0.004, nn.attackTime*(1+chaos*0.5));
  const g1=ctx.createGain();
  g1.gain.setValueAtTime(0,t);
  g1.gain.linearRampToValueAtTime(0.80+windBoost*0.12, t+attackT);
  g1.gain.setValueAtTime(0.72+windBoost*0.10, t+holdTime*0.65);
  g1.gain.exponentialRampToValueAtTime(0.001, t+holdTime);

  // -- LAYER 2: 2nd harmonic (octave up) -- neural mix controls presence -
  const osc2=ctx.createOscillator(); osc2.type='sine'; osc2.frequency.value=f1*2;
  const g2=ctx.createGain();
  const h2vol=nn.harmonicMix*0.28+s.color*0.08;
  g2.gain.setValueAtTime(h2vol,t+attackT*0.5);
  g2.gain.exponentialRampToValueAtTime(0.001,t+holdTime*0.7);

  // -- LAYER 3: 3rd harmonic -- adds growl, driven by chaos -------------
  const osc3=ctx.createOscillator(); osc3.type='sine'; osc3.frequency.value=f1*3;
  const g3=ctx.createGain();
  const h3vol=chaos*0.15*nn.harmonicMix+windBoost*0.06;
  g3.gain.setValueAtTime(h3vol,t+attackT);
  g3.gain.exponentialRampToValueAtTime(0.001,t+holdTime*0.45);

  // -- LAYER 4: FM sideband -- unique timbral complexity per note --------
  const fmCarrier=ctx.createOscillator(); fmCarrier.type='sine'; fmCarrier.frequency.value=f1;
  const fmMod=ctx.createOscillator(); fmMod.type='sine';
  // FM ratio shifts with pitch class: gives each note unique character
  const fmRatio=1.0+pcMod*0.5+chaos*0.3+s.tone*0.2;
  fmMod.frequency.value=f1*fmRatio;
  const fmDepth=ctx.createGain();
  fmDepth.gain.value=f1*(0.12+windBoost*0.18+chaos*0.22+s.sub*0.15);
  fmMod.connect(fmDepth); fmDepth.connect(fmCarrier.frequency);
  const g4=ctx.createGain();
  const fmVol=nn.filterCutoff*0.35+chaos*0.10;
  g4.gain.setValueAtTime(fmVol,t+attackT*0.3);
  g4.gain.exponentialRampToValueAtTime(0.001,t+holdTime*0.55);

  // -- LAYER 5: Neural waveshaper -- saturation amount is inferred -------
  const satCurve=new Float32Array(512);
  const sat=nn.satAmount*(1+chaos*0.8+windBoost*0.4);
  const tanhSat=Math.tanh(sat)||1;
  for(let i=0;i<512;i++){const x=i*2/512-1; satCurve[i]=Math.tanh(x*sat)/tanhSat;}
  const shaper=ctx.createWaveShaper(); shaper.curve=satCurve;
  // Double LPF to keep it truly sub
  const lpf1=ctx.createBiquadFilter(); lpf1.type='lowpass'; lpf1.frequency.value=110+windBoost*20; lpf1.Q.value=0.5;
  const lpf2=ctx.createBiquadFilter(); lpf2.type='lowpass'; lpf2.frequency.value=110+windBoost*20; lpf2.Q.value=0.5;

  // -- MIX all layers through shaper -> lpfs -> dest ---------------------
  const mix=ctx.createGain(); mix.gain.value=1.0;
  osc1.connect(g1); g1.connect(mix);
  osc2.connect(g2); g2.connect(mix);
  osc3.connect(g3); g3.connect(mix);
  fmCarrier.connect(g4); g4.connect(mix);
  mix.connect(shaper); shaper.connect(lpf1); lpf1.connect(lpf2); lpf2.connect(dest);

  const stopT=t+holdTime+0.08;
  [osc1,osc2,osc3,fmMod,fmCarrier].forEach(o=>{o.start(t);o.stop(stopT);});
}

// -- NEURAL BASS ENGINE --------------------------------------------------------
// Midrange bass (60-600Hz) with neural filter envelope shaping.
// Winding number history determines attack character, resonance, and envelope.
// 4 synthesis modes selected by neural inference: pluck, slap, sustain, growl.

function synthBass(ctx, t, note, chaos, warp, windBoost=0, inputChar=0.5, beat=0){
  const dest=bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const pc=((note%12)+12)%12; const pcMod=pc/12;

  // Neural inputs -- same brain as sub, different inference
  const inputs=bassBrain.update(windBoost*10, chaos, pcMod, beat);
  const nn=bassBrain.infer(inputs);

  // Select synthesis mode from neural output + chaos
  // 0=pluck 1=slap 2=sustain 3=growl
  const modeVal=(nn.harmonicMix + chaos*0.3 + windBoost*0.2 + pcMod*0.15) % 1.0;
  const mode=modeVal<0.28?'pluck':modeVal<0.52?'slap':modeVal<0.76?'sustain':'growl';

  const decayTime={pluck:0.22,slap:0.18,sustain:0.55,growl:0.40}[mode]/warp;
  const bodyType={pluck:'triangle',slap:'square',sustain:'sawtooth',growl:'sawtooth'}[mode];

  // -- BODY OSCILLATOR ---------------------------------------------------
  const body=ctx.createOscillator(); body.type=bodyType;
  body.frequency.value=freq*(1+s.color*0.004);
  body.detune.value=(pcMod*8-4)+(s.color*5-2.5);

  // -- RESONANT FILTER: neural cutoff + mode-specific envelope ----------
  const flt=ctx.createBiquadFilter(); flt.type='lowpass';
  const baseQ={pluck:4.5,slap:6.0,sustain:2.5,growl:8.0}[mode];
  flt.Q.value=baseQ+chaos*8+nn.filterCutoff*5+s.punch*3;

  // Filter envelope: each mode has distinct shape
  const fOpen={pluck:800,slap:2200,sustain:600,growl:1400}[mode];
  const fClose={pluck:80,slap:120,sustain:180,growl:60}[mode];
  flt.frequency.setValueAtTime((fOpen+windBoost*400+inputChar*600+chaos*1200+pcMod*300)*warp, t);
  flt.frequency.exponentialRampToValueAtTime((fClose+pcMod*30)*warp, t+decayTime);

  // -- GAIN ENVELOPE -----------------------------------------------------
  const attackT={pluck:0.003,slap:0.001,sustain:0.020,growl:0.008}[mode];
  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.80+windBoost*0.12+pcMod*0.05, t+attackT);
  g.gain.exponentialRampToValueAtTime(0.001, t+decayTime+0.05);

  // -- GROWL MODE: FM ring mod layer ------------------------------------
  if(mode==='growl'){
    const ring=ctx.createOscillator(); ring.type='sine';
    ring.frequency.value=freq*(1.5+chaos*0.5+nn.subFreqMod*3);
    const rg=ctx.createGain(); rg.gain.value=freq*(0.08+chaos*0.18+windBoost*0.10);
    ring.connect(rg); rg.connect(body.frequency);
    ring.start(t); ring.stop(t+decayTime+0.05);
  }

  // -- SLAP MODE: transient click layer ---------------------------------
  if(mode==='slap'){
    const click=ctx.createOscillator(); click.type='square';
    click.frequency.setValueAtTime(freq*4,t);
    click.frequency.exponentialRampToValueAtTime(freq,t+0.02/warp);
    const cg=ctx.createGain();
    cg.gain.setValueAtTime(s.punch*0.55,t);
    cg.gain.exponentialRampToValueAtTime(0.001,t+0.025/warp);
    click.connect(cg); cg.connect(dest);
    click.start(t); click.stop(t+0.03/warp);
  }

  // -- PRESENCE HARMONIC: overtone for articulation ----------------------
  const pres=ctx.createOscillator(); pres.type='sine';
  pres.frequency.value=freq*(2+nn.harmonicMix*0.5);
  const pg=ctx.createGain();
  pg.gain.setValueAtTime((s.color*0.12+nn.filterCutoff*0.06),t);
  pg.gain.exponentialRampToValueAtTime(0.001,t+0.14/warp);
  pres.connect(pg); pg.connect(dest);
  pres.start(t); pres.stop(t+0.18/warp);

  body.connect(flt); flt.connect(g); g.connect(dest);
  body.start(t); body.stop(t+decayTime+0.08);
}

function synthMid(ctx,t,notes,chordType,chaos,warp,dest,windBoost=0){
  const ct=CHORDS[chordType]||CHORDS.maj;
  const fmR=ct.fm+(chaos*0.10-0.05);
  notes.slice(0,5).forEach((note,idx)=>{
    const freq=440*Math.pow(2,(note-69)/12)*warp;
    const car=ctx.createOscillator();const mod=ctx.createOscillator();
    const mG=ctx.createGain();const flt=ctx.createBiquadFilter();const g=ctx.createGain();
    car.type='sine';mod.type='sine';
    car.frequency.value=freq;mod.frequency.value=freq*fmR;
    mG.gain.value=freq*(0.22+chaos*0.5+windBoost*0.15);
    mod.connect(mG);mG.connect(car.frequency);
    flt.type='lowpass';flt.frequency.value=2000+chaos*3000;flt.Q.value=0.75;
    const vol=(0.13+windBoost*0.03)/Math.max(1,notes.length*0.7);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.045/warp);
    g.gain.exponentialRampToValueAtTime(0.001,t+(1.25+idx*0.07)/warp);
    car.connect(flt);flt.connect(g);g.connect(dest);
    mod.start(t);car.start(t);mod.stop(t+(1.4+idx*0.07)/warp);car.stop(t+(1.4+idx*0.07)/warp);
  });
}

// Supersaw lead with portamento
function synthLead(ctx,t,note,chaos,warp,dest,windBoost=0){
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const from=440*Math.pow(2,((note-7)-69)/12)*warp;
  const master=ctx.createGain();
  const flt=ctx.createBiquadFilter();flt.type='lowpass';
  flt.frequency.setValueAtTime((1600+chaos*4200)*warp,t);
  flt.frequency.exponentialRampToValueAtTime(700,t+0.35/warp);
  flt.Q.value=1.6+chaos*3.5;
  master.connect(flt);flt.connect(dest);
  [-7,0,7].forEach(det=>{
    const o=ctx.createOscillator();o.type='sawtooth';o.detune.value=det;
    o.frequency.setValueAtTime(from,t);o.frequency.exponentialRampToValueAtTime(freq,t+0.07/warp);
    o.connect(master);o.start(t);o.stop(t+0.6/warp);
  });
  master.gain.setValueAtTime(0.10+windBoost*0.03,t);master.gain.exponentialRampToValueAtTime(0.001,t+0.58/warp);
}

  // -- SYNC REFS -------------------------------------------------------------
  useEffect(()=>{AR.current.chaos=chaos;AR.current.density=density;AR.current.swing=swing;AR.current.bpm=bpm;AR.current.warpMultiplier=Math.pow(2,recordScratch/100);bus.updateDelayTime(bpm);},[chaos,density,swing,bpm,recordScratch]);
  useEffect(()=>{AR.current.userRole=userRole;},[userRole]);
  useEffect(()=>{isPlayRef.current=isPlaying;},[isPlaying]);
  useEffect(()=>{lockedRef.current=lockedIn;},[lockedIn]);
  useEffect(()=>{mutesRef.current=mutes;},[mutes]);
  useEffect(()=>{hapticModeRef.current=hapticMode;},[hapticMode]);
  useEffect(()=>{deafModeRef.current=deafMode;},[deafMode]);

  // -- WEB MIDI SETUP --------------------------------------------------------
  useEffect(()=>{
    if(!navigator.requestMIDIAccess)return;
    navigator.requestMIDIAccess().then(access=>{
      midiRef.current=access;
      access.inputs.forEach(input=>{
        input.onmidimessage=e=>{
          const[status,note,velocity]=e.data;
          if((status&0xf0)===0x90&&velocity>0){
            // Note on -> treat as pitch input
            AR.current.rootMidi=note;
            setDMidi(note);
            motifEng.addPitch(note,Date.now());
            pitchHistRef.current[note%12]+=0.2;
            // Visual tap on tap canvas
            tapVizRef.current.push({x:Math.random(),y:Math.random(),t:Date.now(),intensity:velocity/127,midi:note});
            hap.tap();
            if(!isPlayRef.current)startBand();
          }
        };
      });
      addLog('MIDI connected.');
    }).catch(()=>{});
  },[]);

  // -- ROLE CLASSIFICATION ---------------------------------------------------
  const classifyRole=(freq,rms,pitchConf,onsetRate)=>{
    if(pitchConf<25&&onsetRate>2.5)return'drum';
    if(freq>0&&freq<180)return'bass';
    if(freq>=180&&freq<900)return'mid';
    if(freq>=900)return'lead';
    return'unknown';
  };

  // -- LOCK IN ---------------------------------------------------------------
  const handleLockIn=()=>{
    const ar=AR.current;
    if(!lockedIn){
      ar.lockedBpm=ar.bpm;ar.lockedSwing=ar.swing;ar.lockedRoot=ar.rootMidi;
      setLockedIn(true);
      addLog(`[lock] LOCKED: ${ar.bpm}BPM . ${ar.swing}% swing . ${midiToNote(ar.rootMidi)} -- Stop mic for highest quality.`);
      hap.lockIn();
    }else{
      ar.lockedBpm=null;ar.lockedSwing=null;ar.lockedRoot=null;
      setLockedIn(false);addLog('[unlock] Unlocked.');hap.tap();
    }
  };

  // -- MIC -------------------------------------------------------------------
  const toggleMic=async()=>{
    if(micActive){
      if(AR.current.micStream)AR.current.micStream.getTracks().forEach(t=>t.stop());
      AR.current.analyser=null;setMicActive(false);setConf(0);setUserRole('unknown');
      if(lockedIn)addLog('Mic off . Hands-free mode active.');
      else addLog('Mic off.');return;
    }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
      if(!AR.current.ctx)AR.current.ctx=new(window.AudioContext||window.webkitAudioContext)();
      if(AR.current.ctx.state==='suspended')await AR.current.ctx.resume();
      bus.init(AR.current.ctx);
      const src=AR.current.ctx.createMediaStreamSource(stream);
      const an=AR.current.ctx.createAnalyser();an.fftSize=8192;an.smoothingTimeConstant=0.76;
      src.connect(an);AR.current.micStream=stream;AR.current.analyser=an;
      setMicActive(true);
      addLog('Listening. Play -- AI builds band around you. Lock In then stop mic for best quality.');
    }catch(e){addLog('Mic access denied.');}
  };

  // -- SECTION MUTE ----------------------------------------------------------
  const toggleMute=role=>{
    setMutes(prev=>{
      const next={...prev,[role]:!prev[role]};
      if(!prev[role])addLog(`${role.toUpperCase()} muted. Pattern saved.`);
      else addLog(`${role.toUpperCase()} back in.`);
      hap.mute();
      return next;
    });
  };

  // -- REHARM ----------------------------------------------------------------
  const reharm=type=>{
    AR.current.chordType=type;setCChord(type);
    const label=CHORDS[type]?.label||type;
    addLog(`Reharm -> ${label}`);
    hap.chordQuality(type);
  };

  // -- RESTART BAND ----------------------------------------------------------
  const restartBand=()=>{
    if(!isPlaying)return;
    clearTimeout(AR.current.timerID);
    AR.current.current16thNote=0;AR.current.rhythmHistory={};
    AR.current.nextNoteTime=AR.current.ctx.currentTime+0.05;
    scheduler();
    addLog('Band restarted. Locked state preserved.');
    hap.restart();
  };
  // -- IN-APP RECORDING ----------------------------------------------------------
  const toggleRecording=async()=>{
    unlockHaptics();
    if(isRecording){
      if(mediaRecorderRef.current)mediaRecorderRef.current.stop();
      setIsRecording(false);
      return;
    }
    try{
      const ar=AR.current;
      if(!ar.ctx){addLog('Start band first to record');return;}
      const dest=ar.ctx.createMediaStreamDestination();
      if(bus&&bus.master)bus.master.connect(dest);
      const mr=new MediaRecorder(dest.stream,{mimeType:'audio/webm;codecs=opus'});
      recordChunksRef.current=[];
      mr.ondataavailable=function(e){if(e.data.size>0)recordChunksRef.current.push(e.data);};
      mr.onstop=function(){
        const blob=new Blob(recordChunksRef.current,{type:'audio/webm'});
        const url=URL.createObjectURL(blob);
        setRecordingUrl(url);
        addLog('Recording saved -- tap Download to save');
      };
      mr.start(100);
      mediaRecorderRef.current=mr;
      setIsRecording(true);
      addLog('Recording started...');
    }catch(err){addLog('Recording error: '+err.message);}
  };

  // -- PHRASE RECORDING -------------------------------------------------------
  const startPhrase=()=>{
    motifEng.startPhrase();
    setPhraseRecording(true);
    addLog('[REC] Phrase started -- sing your motif now');
    hap.tap();
  };

  const endPhrase=()=>{
    const result=motifEng.endPhrase();
    setPhraseRecording(false);
    if(!result){addLog('[REC] Too short -- sing at least 3 notes');return;}
    setLastPhrase(result);
    setCompletedPhrases(p=>[result,...p].slice(0,8));
    improvState.phrases.push(result);
    // Apply detected time sig to scheduler
    const ts=motifEng.dominantTimeSig();
    if(ts>=2&&ts<=9){
      AR.current.stepsPerMeasure=ts*4;
      setTS(ts*4);
    }
    // Apply reharmonization suggestion
    if(result.reharmonSuggestion){
      AR.current.chordType=result.reharmonSuggestion;
      setCChord(result.reharmonSuggestion);
    }
    // Billboard entry
    setBillboard(prev=>{
      const entry={
        rank:prev.length+1,
        key:NOTE_NAMES[result.root],
        chord:result.reharmonSuggestion,
        timeSig:result.timeSig,
        hasTA:result.hasTA,
        t:new Date().toLocaleTimeString(),
        ivs:result.ivs.slice(0,4).map(function(v){return v>0?'+'+v:String(v);}).join(' ')
      };
      return [entry,...prev].slice(0,10);
    });
    addLog(`[REC] Phrase done: key=${NOTE_NAMES[result.root]} chord=${result.reharmonSuggestion} time=${result.timeSig}/4${result.hasTA?' TURNAROUND':''} inv=${result.inversion}`);
    // Save phrase to Supabase for memory
    try{fetch(SB_URL+'/rest/v1/genesis_brain',{method:'POST',headers:SB_UH,
      body:JSON.stringify({namespace:'phrases',version:Date.now(),
        payload:{root:result.root,ivs:result.ivs,timeSig:result.timeSig,
          reharmonSuggestion:result.reharmonSuggestion,hasTA:result.hasTA,
          inversion:result.inversion,_ts:Date.now()}})});}catch(e){}
    hap.motif();
    if(!isPlayRef.current)startBand();
  };

  // -- SONG UPLOAD ------------------------------------------------------------
  const handleUpload=async(e)=>{
    const file=e.target.files[0]; if(!file)return;
    setUploadStatus('Analyzing...');
    try{
      if(!AR.current.ctx)AR.current.ctx=new(window.AudioContext||window.webkitAudioContext)();
      if(AR.current.ctx.state==='suspended')await AR.current.ctx.resume();
      const ab=await file.arrayBuffer();
      const audio=await AR.current.ctx.decodeAudioData(ab);
      // Analyze: extract tempo via onset detection on downmixed buffer
      const ch=audio.getChannelData(0);
      const sr=audio.sampleRate;
      const hop=Math.floor(sr*0.01); // 10ms hop
      const onsets=[];
      let prev=0;
      for(let i=0;i<ch.length-hop;i+=hop){
        let rms=0;for(let j=0;j<hop;j++)rms+=ch[i+j]*ch[i+j];
        rms=Math.sqrt(rms/hop);
        if(rms>prev*1.5&&rms>0.02&&(onsets.length===0||i/sr-onsets[onsets.length-1]>0.15))
          onsets.push(i/sr);
        prev=rms*0.85+prev*0.15;
      }
      // Estimate tempo from onset intervals
      let detectedBpm=120;
      if(onsets.length>4){
        const gaps=onsets.slice(1).map((ot,oi)=>ot-onsets[oi]);
        const med=gaps.sort((a,b)=>a-b)[Math.floor(gaps.length/2)];
        detectedBpm=Math.round(60/med);
        if(detectedBpm<40)detectedBpm*=2;
        if(detectedBpm>200)detectedBpm=Math.round(detectedBpm/2);
        detectedBpm=Math.max(60,Math.min(200,detectedBpm));
      }
      // Estimate key from spectral centroid per chroma bin (simplified)
      const fftSize=2048;
      const chroma=new Array(12).fill(0);
      for(let i=0;i<Math.min(ch.length,sr*10);i+=fftSize){
        const slice=ch.slice(i,i+fftSize);
        for(let j=0;j<slice.length;j++){
          if(Math.abs(slice[j])>0.01){
            const pitchEst=Math.round(69+12*Math.log2(Math.max(0.001,Math.abs(slice[j]))*440/0.02));
            chroma[((pitchEst%12)+12)%12]+=Math.abs(slice[j]);
          }
        }
      }
      const detectedRoot=chroma.indexOf(Math.max(...chroma));
      improvState.uploadedKey=detectedRoot;
      improvState.uploadedTempo=detectedBpm;
      AR.current.rootMidi=60+detectedRoot;
      AR.current.bpm=detectedBpm;
      setBpm(detectedBpm);
      setDMidi(60+detectedRoot);
      addLog(`Song analyzed: ${NOTE_NAMES[detectedRoot]} @ ${detectedBpm}BPM -- band locked to song`);
      setUploadStatus(`${NOTE_NAMES[detectedRoot]} @ ${detectedBpm}BPM`);
      if(!isPlayRef.current)startBand();
    }catch(err){
      setUploadStatus('Error: '+err.message);
      addLog('Upload failed: '+err.message);
    }
  };

  // -- HAPTIC MODES ----------------------------------------------------------
  const hapticModeDescriptions={
    standard:'Light tap per hit',
    bass:'Long deep pulse on every beat (best for deaf users)',
    rhythm:'Full rhythm pattern vibrated each measure',
    chord:'Chord quality encoded in vibration pattern',
  };

  // -- TAP PAD ---------------------------------------------------------------
  const tapRef=useRef({times:[],lastTap:0});
  const handleTap=useCallback(async(e,x,y)=>{
    e.preventDefault();
    if(hapticModeRef.current==='bass')hap.subBass(AR.current.bpm);
    else hap.tap();

    setTapPulse(true);setTimeout(()=>setTapPulse(false),260);

    if(!AR.current.ctx)AR.current.ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(AR.current.ctx.state==='suspended')await AR.current.ctx.resume();
    bus.init(AR.current.ctx);

    const now=Date.now();const tap=tapRef.current;
    if(now-tap.lastTap>3000)tap.times=[];
    tap.times.push(now);tap.lastTap=now;setTapCount(tap.times.length);

    // Visual tap dot on tap canvas
    const rect=e.currentTarget?.getBoundingClientRect?.();
    const tx=rect?(e.clientX-rect.left)/rect.width:0.5;
    const ty=rect?(e.clientY-rect.top)/rect.height:0.5;
    tapVizRef.current.push({x:tx,y:ty,t:now,intensity:1});
    // Also register as input energy for hands-free detection
    AR.current.inputEnergy=1.0;
    setInputEnergy(1.0);setTimeout(()=>{AR.current.inputEnergy=0;setInputEnergy(0);},200);

    if(tap.times.length>=4){
      const result=motifEng.addOnset(now);
      if(result){
        const{bpm:tb,swingPct,subdivisions:sub}=result;
        if(tb>=30&&tb<=280){
          setBpm(tb);AR.current.bpm=tb;
          if(Math.abs(tb-bpm)>6){setTCFlag(true);setTimeout(()=>setTCFlag(false),1500);}
        }
        if(swingPct>0){setSwing(swingPct);AR.current.swing=swingPct;setDSwing(swingPct);}
        setSubdivisions(sub||2);
        const subLabel={1:'whole',2:'8th',3:'triplet/jazz',4:'16th',5:'quintuplet',6:'sextuplet',7:'septuplet'};
        if(sub>2)addLog(`Rhythm: ${subLabel[sub]||sub+'-tuplet'} feel`);
      }
    }else{
      motifEng.addOnset(now); // always register onset, result only used after 4+
    }

    if(!isPlayRef.current)startBand();
  },[bpm]);

  // -- START / STOP ----------------------------------------------------------
  const startBand=async()=>{
    if(isPlayRef.current)return; // guard against double-start
    if(!AR.current.ctx)AR.current.ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(AR.current.ctx.state==='suspended')await AR.current.ctx.resume();
    bus.init(AR.current.ctx);
    setIsPlaying(true);isPlayRef.current=true;
    AR.current.nextNoteTime=AR.current.ctx.currentTime+0.08;
    scheduler();hap.tap();
    addLog('Band active.');
  };

  const togglePlay=async()=>{
    if(!AR.current.ctx)AR.current.ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(AR.current.ctx.state==='suspended')await AR.current.ctx.resume();
    bus.init(AR.current.ctx);
    if(isPlaying){
      clearTimeout(AR.current.timerID);
      setIsPlaying(false);isPlayRef.current=false;
      try{await db.from('athematic_history').insert([{chaos,density,swing,bpm,timeSignature,rootMidi:AR.current.rootMidi}]);}catch(e){} collectiveBrainSave();
      hap.restart();
    }else{await startBand();}
  };

  // -- SCHEDULE NOTE ---------------------------------------------------------
  const scheduleNote=(beat,time)=>{
    const ar=AR.current;const voices=voicesRef.current;
    const{ctx,chaos,density,stepsPerMeasure,warpMultiplier,userRole,chordType}=ar;
    const rootMidi=ar.lockedRoot??ar.rootMidi;
    const mutes=mutesRef.current;
    const ie=ar.inputEnergy||0.5;
    const tick=ar.tick++;
    Object.values(voices).forEach(v=>v.tick());

    if(beat===0){
      brain.auto(userRole,[0,4,7,11],chaos); collectiveBrainSave();
      // -- LEARNING ENGINES: fire every measure ----------------------------
      const sim3Ch=window._sim3ChaosLatest||chaos;
      chaosRewardEngine.update(sim3Ch, chordType);
      progressionMemory.push(chordType, sim3Ch);
      convergenceTracker.push(sim3Ch, chordType, completedPhrases.length);
      // Progression suggestion: override chord if memory has a strong suggestion
      const sugg=progressionMemory.suggest(chordType);
      if(sugg&&CHORDS[sugg]&&Math.random()<0.35){ar.chordType=sugg;setCChord(sugg);}
      if(sugg)setProgSuggestion(sugg);
      // Update convergence score display
      setConvergenceScore(convergenceTracker.sessionScore);
      // -- SMELL SENSE: dominant element biases chord choice ---------------
      // assimilation elements (H, N) -> pull toward modal/minor chords
      // repulsion elements (B)       -> push toward dissonant chords  
      // structure elements (He,Li,Be,C,O) -> reinforce current chord
      const smell=window._smellLatest;
      if(smell?.dominant_logic){
        const sLevel=smell.synthesis_level||0;
        if(smell.dominant_logic==='assimilation'){
          brain.reward(userRole,3,0.7+sLevel*0.2); // minor 3rd
          brain.reward(userRole,10,0.65+sLevel*0.2); // minor 7th
        }else if(smell.dominant_logic==='repulsion'){
          brain.reward(userRole,6,0.75+sLevel*0.2); // tritone
          brain.reward(userRole,1,0.6);              // minor 2nd
        }else if(smell.dominant_logic==='structure'){
          // reinforce whatever chord is playing
          const ct=CHORDS[chordType]||CHORDS.maj;
          ct.iv.forEach(iv=>brain.reward(userRole,iv,0.8+sLevel*0.15));
        }
        // If synthesis converging (>0.7) — lock in current patterns
        if(sLevel>0.7){
          ar.lockedRoot=ar.lockedRoot??rootMidi;
          addLog('[SMELL] Synthesis converging — locking root '+midiToNote(rootMidi));
        }
      }
      // -- TECH SENSE: atom grade affects density + bass mode ---------------
      const tech=window._techLatest;
      if(tech?.grade==='GRADE_A'&&tech.chaos!=null){
        // High-grade atoms = increase density slightly
        const newDens=Math.min(1,density+0.008);
        ar.density=newDens;setDensity(newDens);
      }
      if(tech?.chaos!=null){
        // Blend tech chaos with sim3 chaos for richer bass modulation
        const blendedChaos=Math.max(chaos,(tech.chaos+chaos)*0.5);
        bassBrain.update(ar.lockedRoot??rootMidi, blendedChaos, ((rootMidi%12)/12), beat);
      }
      if(Math.random()<chaos*0.2){
        const ms=[12,14,16,20];const m=ms[Math.floor(Math.random()*ms.length)];
        ar.stepsPerMeasure=m;setTS(m);
      }
      // Rhythm haptic mode -- vibrate the full beat pattern
      if(hapticModeRef.current==='rhythm'){
        const spb=Math.round(60000/(ar.lockedBpm||ar.bpm));
        hap.rhythm([spb,spb,spb,spb]);
      }
      // Echo motif -- fifth echo
      const echoResult=motifEng.popEcho();
      if(echoResult&&userRole!=='lead'&&!mutes.lead){
        echoResult.ivs.forEach(function(iv,ei){
          const echoNote=echoResult.root+iv+echoResult.transpose;
          if(echoNote>=24&&echoNote<=96){
            const eT=time+(ei*(60/(ar.bpm*4)));
            synthLead(ctx,eT,echoNote,chaos*0.45,warpMultiplier,bus.getInput('lead'),0.2);
          }
        });
        setMotifFlag(true);setTimeout(function(){setMotifFlag(false);},1100);hap.motif();
      }
      // -- PUBLISH TO GENESIS BRAIN every measure -------------------------
      // All sims receive this via realtime WS push -- no polling
      gbWrite({
        bpm:       ar.lockedBpm||ar.bpm,
        beat_phase:beat,
        root_midi: rootMidi,
        chord_type:chordType,
        chaos,
        density,
        swing:     ar.lockedSwing||ar.swing,
        steps:     stepsPerMeasure,
        warp:      warpMultiplier,
        user_role: userRole,
        winding_drum: voices.drum?.winding||0,
        winding_bass: voices.bass?.winding||0,
        winding_mid:  voices.mid?.winding||0,
        winding_lead: voices.lead?.winding||0,
        sub_active:  !mutes.sub,
        bass_active: !mutes.bass,
        invRadius:   Math.round(60 + (ar.lockedBpm||ar.bpm) * 0.5), // radius hint for sims
      });
    }

    const bk=beat%stepsPerMeasure;
    const hist=ar.rhythmHistory[bk]||{k:false,s:false,h:false,b:false,m:false,l:false};
    const bb=Math.floor(stepsPerMeasure/2);
    const sup={drum:userRole==='drum',bass:userRole==='bass',mid:userRole==='mid',lead:userRole==='lead'};

    // -- DRUMS -------------------------------------------------------------
    if(!sup.drum&&!mutes.drum){
      const playK=beat===0?true:Math.random()<chaos*0.28*(hist.k?0.05:2.2);
      const playS=(beat===bb||beat===bb+4)?true:Math.random()<chaos*0.18*(hist.s?0.04:2.1);
      const playH=Math.random()<density*0.88*(hist.h?0.55:1.4);
      const openH=Math.random()<chaos*0.09;
      if(playK){synthKick(ctx,time,warpMultiplier,bus.getInput('drum'),ie);voices.drum.play();
        if(hapticModeRef.current==='bass'||deafModeRef.current)hap.kick();else hap.tap();}
      if(playS){synthSnare(ctx,time,chaos,warpMultiplier,bus.getInput('drum'),1-ie);voices.drum.play();
        if(hapticModeRef.current==='rhythm')hap.snare();}
      if(playH){synthHat(ctx,time,openH,chaos,warpMultiplier,bus.getInput('drum'),ie);}
    }

    // -- EXCLUSION PRINCIPLE -----------------------------------------------
    const ct=CHORDS[chordType]||CHORDS.maj;
    const bassAsserts=voices.bass.winding>voices.mid.winding;
    const bassOpts=sup.bass||mutes.bass?[]:[0,7,5,ct.iv[1]||4];
    const midOpts =sup.mid ||mutes.mid ?[]:(bassAsserts?ct.iv.slice(2).map(v=>v+12):ct.iv);
    const leadOpts=sup.lead||mutes.lead?[]:[12,14,(ct.iv[1]||4)+12,(ct.iv[2]||7)+12,19];

    // -- SUB BASS + BASS -- alternating, never simultaneous -----------------
    // Sub owns downbeat (beat 0) and the half-note (beat 8 in 4/4).
    // Bass fills offbeats and syncopations. They share winding memory.
    if(!sup.bass&&!mutes.bass&&bassOpts.length){
      const iv=brain.choose(userRole,bassOpts,chaos);
      const baseNote=rootMidi+iv-12;

      // Sub bass: plays on beat 0 and beat bb (half note positions)
      const isSubBeat=(beat===0||(beat===bb&&Math.random()<0.75));
      if(isSubBeat&&!mutes.sub){
        synthSubBass(ctx,time,baseNote,chaos,warpMultiplier,voices.bass.winding*0.08,beat);
        voices.bass.play();voices.bass.lastNote=baseNote;
        if(deafModeRef.current||hapticModeRef.current==='bass')hap.subBass(ar.lockedBpm||ar.bpm);
      }

      // Bass: plays on offbeats -- never beat 0, never beat bb (those belong to sub)
      const isBassBeat=beat!==0&&beat!==bb&&(beat===Math.floor(bb/2)||beat===Math.floor(bb*1.5)||Math.random()<density*0.55*(hist.b?0.08:1.5));
      if(isBassBeat){
        synthBass(ctx,time,baseNote,chaos,warpMultiplier,voices.bass.winding*0.08,ie,beat);
        voices.bass.play();voices.bass.lastNote=baseNote;
        if(deafModeRef.current||hapticModeRef.current==='bass')hap.kick();
      }
    }

    // -- MID ---------------------------------------------------------------
    if(!sup.mid&&!mutes.mid&&midOpts.length){
      const prob=beat===0?1:chaos*0.55*(hist.m?0.08:1.9);
      if(Math.random()<prob){
        const notes=chaos>0.72?[rootMidi,rootMidi+5,rootMidi+10]:ct.iv.map(v=>rootMidi+v);
        synthMid(ctx,time,notes,chordType,chaos,warpMultiplier,bus.getInput('mid'),voices.mid.winding*0.07);
        voices.mid.play();
        if(hapticModeRef.current==='chord')hap.chordQuality(chordType);
      }
    }

    // -- LEAD -------------------------------------------------------------
    if(!sup.lead&&!mutes.lead&&leadOpts.length){
      const prob=density*(hist.l?0.14:1.6)*0.65;
      if(Math.random()<prob){
        const iv=brain.choose(userRole,leadOpts,chaos);
        synthLead(ctx,time,rootMidi+iv,chaos,warpMultiplier,bus.getInput('lead'),voices.lead.winding*0.07);
        voices.lead.play();voices.lead.lastNote=rootMidi+iv;
      }
    }

    ar.rhythmHistory[bk]={k:!sup.drum,s:!sup.drum,h:!sup.drum,b:!sup.bass,m:!sup.mid,l:!sup.lead};
  };

  const scheduler=()=>{
    const ar=AR.current;

          </div>
          <div className="bg-slate-900/60 rounded-lg p-2">
            <div className="text-slate-600 uppercase text-[7px] mb-0.5">Neural Bass</div>
            <div className="text-cyan-400 font-black text-lg">{Math.round(Math.min(100,bassBrain.history.length/32*100))}%</div>
          </div>
        </div>
      </div>

      {/* LEARNING MODE SELECTOR */}
      <div className="bg-[#0b1120] border border-violet-500/25 rounded-xl p-3">
        <div className="flex justify-between items-center mb-2">
          <div className="text-[9px] text-violet-400 uppercase tracking-widest font-bold">Deep Learning Mode</div>
          {learningMode!=='none'&&<span className="text-[7px] text-violet-300 animate-pulse">● ACTIVE</span>}
        </div>
        <div className="grid grid-cols-2 gap-1.5 mb-2">
          {[
            ['none',    'OFF',         'Standard Q-learning only','text-slate-500','border-slate-700'],
            ['chaos',   'CROSS-SENSE', 'sim3 chaos rewards harmony','text-cyan-400','border-cyan-800'],
            ['progression','PROG MEM', 'Learn chord sequences','text-purple-400','border-purple-800'],
            ['convergence','CONVERGE', 'Loss fn + auto exploration','text-amber-400','border-amber-800'],
          ].map(([id,label,desc,col,border])=>(
            <button key={id} onClick={()=>setLearningMode(id)}
              className={"p-2 rounded-lg border text-left transition-all "+(learningMode===id?`bg-slate-800 ${border} ${col}`:`bg-slate-900/40 border-slate-800 text-slate-600 hover:border-slate-600`)}>
              <div className={"text-[9px] font-bold uppercase tracking-wide "+(learningMode===id?col:'text-slate-500')}>{label}</div>
              <div className="text-[7px] text-slate-600 mt-0.5 leading-tight">{desc}</div>
            </button>
          ))}
        </div>
        {learningMode==='chaos'&&(
          <div className="text-[8px] text-cyan-400/70 bg-cyan-500/5 border border-cyan-500/10 rounded p-2">
            sim3 chaos: <span className="font-bold">{sim3Chaos!=null?Number(sim3Chaos).toFixed(3):'waiting...'}</span>
            {' · '}rewarding {(sim3Chaos||0)>0.55?'dissonant':'consonant'} chords
          </div>
        )}
        {learningMode==='progression'&&(
          <div className="text-[8px] text-purple-400/70 bg-purple-500/5 border border-purple-500/10 rounded p-2">
            Library: <span className="font-bold">{progressionMemory.library.length} sequences</span>
            {progressionSuggestion&&<span> · next: <span className="text-purple-300 font-bold">{CHORDS[progressionSuggestion]?.label||progressionSuggestion}</span></span>}
          </div>
        )}
        {learningMode==='convergence'&&(
          <div className="text-[8px] text-amber-400/70 bg-amber-500/5 border border-amber-500/10 rounded p-2">
            Score: <span className="font-bold text-amber-300">{convergenceScore}/100</span>
            {' · '}eps: <span className="font-mono">{brain.eps.toFixed(3)}</span>
            {' · '}{convergenceScore>70?'converging ✓':convergenceScore>40?'learning...':'exploring'}
          </div>
        )}
      </div>

      {/* RECORDING */}
      <div className="bg-[#0b1120] border border-rose-500/20 rounded-xl p-3">
        <div className="text-[9px] text-rose-400 uppercase tracking-widest font-bold mb-2">In-App Recording</div>
        <div className="flex gap-2 items-center flex-wrap">
          <button onClick={toggleRecording}
            className={"px-4 py-2 text-[10px] font-bold uppercase rounded-lg border transition-all "+(isRecording?'bg-rose-500/20 border-rose-500/50 text-rose-300 animate-pulse':'bg-slate-800/60 border-slate-700 text-slate-400 hover:border-rose-500/30 hover:text-rose-400')}>
            {isRecording?'Stop Recording':'Record Session'}
          </button>
          {recordingUrl&&(
            <a href={recordingUrl} download="live_ai_band_session.webm"
              className="px-4 py-2 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-[10px] font-bold uppercase rounded-lg hover:bg-emerald-500/20">
              Download
            </a>
          )}
          {isRecording&&<span className="text-[8px] text-rose-400 animate-pulse">Recording...</span>}
        </div>
      </div>

      {/* BILLBOARD TOP 10 */}
      <div className="bg-[#0b1120] border border-amber-500/20 rounded-xl p-3">
        <div className="text-[9px] text-amber-400 uppercase tracking-widest font-bold mb-2">Billboard Top 10 -- Your Inputs</div>
        {billboard.length===0?(
          <p className="text-[9px] text-slate-600">No entries yet. Record phrases to populate.</p>
        ):(
          <div className="space-y-1">
            {billboard.map(function(entry,idx){return(
              <div key={idx} className="flex items-center gap-2 bg-slate-900/60 rounded px-2 py-1.5">
                <span className="text-[8px] font-black w-4" style={{color:idx===0?'#f59e0b':idx<3?'#94a3b8':'#475569'}}>#{idx+1}</span>
                <span className="text-[8px] text-white font-mono">{entry.key}</span>
                <span className="text-[8px] text-purple-400">{entry.chord}</span>
                <span className="text-[8px] text-amber-400">{entry.timeSig}/4</span>
                {entry.hasTA&&<span className="text-[7px] text-rose-400">TA</span>}
                <span className="text-[7px] text-slate-500 font-mono ml-1">{entry.ivs}</span>
                <span className="text-[7px] text-slate-700 ml-auto">{entry.t}</span>
              </div>
            );})}
          </div>
        )}
      </div>

      {/* SIM3COLTS LIVE FEED */}
      {sim3Balls.length>0&&(
        <div className="bg-[#0b1120] border border-emerald-500/20 rounded-xl p-3">
          <div className="text-[9px] text-emerald-400 uppercase tracking-widest font-bold mb-2">sim3colts Live -- {sim3Balls.length} balls</div>
          <div className="relative h-20 bg-black/50 rounded-lg overflow-hidden">
            {sim3Balls.slice(0,20).map(function(b,i){
              const x=(b.x||0.5)*100;
              const y=(b.y||0.5)*100;
              const col=b.color||'#22d3ee';
              const size=4+((b.winding||0)*0.8);
              return(
                <div key={i} className="absolute rounded-full transition-all duration-500"
                  style={{left:x+'%',top:y+'%',width:size+'px',height:size+'px',
                    background:col,boxShadow:'0 0 '+size+'px '+col,
                    transform:'translate(-50%,-50%)'}}/>
              );
            })}
          </div>
          <div className="text-[7px] text-slate-700 mt-1">chaos: {sim3Chaos!==null?Number(sim3Chaos).toFixed(2):'--'}</div>
        </div>
      )}

      {/* Launch from improv tab */}
      <button onClick={togglePlay}
        className={"w-full py-3 rounded-xl font-black text-sm uppercase tracking-widest "+(isPlaying?'bg-rose-500 text-white':'bg-emerald-500 text-slate-900')}>
        {isPlaying?'HALT BAND':'START BAND'}
      </button>

    </div>)}

    {/* SIM3 VIZ TAB */}
    {activeTab==='sim3'&&(<div className="space-y-3">

      <div className="bg-[#0b1120] border border-emerald-500/20 rounded-xl overflow-hidden">
        <canvas ref={sim3CanvasRef} width={600} height={400}
          style={{width:'100%',height:'auto',display:'block',background:'#050810'}}/>
      </div>

      <div className="grid grid-cols-3 gap-2">
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3 text-center">
          <div className="text-[7px] text-slate-600 uppercase tracking-widest mb-1">Balls Tracked</div>
          <div className="text-emerald-400 font-black text-xl">{sim3Balls.length}</div>
        </div>
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3 text-center">
          <div className="text-[7px] text-slate-600 uppercase tracking-widest mb-1">Chaos Ratio</div>
          <div className="text-cyan-400 font-black text-xl">{sim3Chaos!=null?Number(sim3Chaos).toFixed(3):'--'}</div>
        </div>
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3 text-center">
          <div className="text-[7px] text-slate-600 uppercase tracking-widest mb-1">Band Status</div>
          <div className={`font-black text-xl ${isPlaying?'text-rose-400':'text-slate-600'}`}>{isPlaying?'LIVE':'IDLE'}</div>
        </div>
      </div>

      {sim3Balls.length>0&&(
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3">
          <div className="text-[9px] text-slate-400 uppercase tracking-widest font-bold mb-2">Top Winding Nodes</div>
          <div className="space-y-1">
            {[...sim3Balls].sort((a,b)=>(b.winding||0)-(a.winding||0)).slice(0,6).map((b,i)=>(
              <div key={i} className="flex items-center gap-2 bg-slate-900/60 rounded px-2 py-1">
                <div style={{width:8,height:8,borderRadius:'50%',background:b.color||'#22d3ee',boxShadow:'0 0 6px '+(b.color||'#22d3ee')}}/>
                <span className="text-[8px] font-mono text-slate-400">W#{b.winding||0}</span>
                <span className="text-[8px] text-slate-600">x:{((b.x||0)*100).toFixed(1)}% y:{((b.y||0)*100).toFixed(1)}%</span>
                <span className="text-[7px] ml-auto" style={{color:b.color||'#22d3ee'}}>glow:{((b.glow||0)*100).toFixed(0)}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="bg-[#0b1120] border border-cyan-500/10 rounded-xl p-3">
        <div className="text-[9px] text-slate-400 uppercase tracking-widest font-bold mb-2">Sim3 → Band Feed</div>
        <div className="text-[8px] text-slate-500 leading-relaxed">Chaos ratio from sim3colts V3 modulates band harmonic density. High chaos drives irrational FM ratios, wider scale exploration, neural bass growl mode. Low chaos locks closed orbits, melodic resolution, sub bass bloom.</div>
        <div className="mt-2 h-2 rounded-full bg-slate-800 overflow-hidden">
          <div className="h-full rounded-full transition-all duration-500"
            style={{width:((sim3Chaos||0)*100)+'%',background:'linear-gradient(90deg,#22d3ee,#f43f5e)'}}/>
        </div>
        <div className="flex justify-between text-[7px] text-slate-700 mt-0.5"><span>CLOSED ORBIT</span><span>CHAOS VOID</span></div>
      </div>

      <button onClick={togglePlay}
        className={"w-full py-3 rounded-xl font-black text-sm uppercase tracking-widest "+(isPlaying?'bg-rose-500 text-white':'bg-emerald-500 text-slate-900')}>
        {isPlaying?'HALT BAND':'START BAND'}
      </button>

    </div>)}

    {/* LOG -- always visible */}
    <div className="bg-black/50 border border-slate-800/50 rounded-xl p-2.5 h-24 overflow-y-auto space-y-0.5">
      {log.map((m,i)=><div key={i} className="text-[8px] text-slate-500 leading-relaxed">{m}</div>)}
    </div>

    <p className="text-center text-[8px] text-slate-800 uppercase tracking-widest pb-1">Beyond Bound . Neural Bass . Collective Brain . Every Session Teaches</p>
  </div>
  </div>
  );
}

const root=createRoot(document.getElementById('root'));
try {
  root.render(<App/>);
  setTimeout(()=>{const ls=document.getElementById('loading-screen');if(ls)ls.style.display='none';},300);
} catch(err) {
  const ls=document.getElementById('loading-screen');
  if(ls){
    ls.innerHTML='<div style="font-family:monospace;color:#f43f5e;padding:24px;max-width:340px;font-size:11px;line-height:1.8;word-break:break-all;">'
      +'<div style="font-size:13px;margin-bottom:12px;color:#fff;">Render Error</div>'
      +String(err)+'<br><br>'
      +(err.stack||'').split('\n').slice(0,4).join('<br>')
      +'</div>';
  }
}
</script>
</body>
</html>
